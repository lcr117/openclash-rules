;Custom_OpenClash_Rules

[custom]

;==================================================
; 规则设置
;==================================================

;本地地址和私有网络直连
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

;自定义直连规则
ruleset=🎯 全球直连,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Domain.yaml,28800
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Direct_Classical_IP.yaml,28800

;Google 中国可直连域名
ruleset=🎯 全球直连,[]GEOSITE,google-cn

;国内游戏平台
ruleset=🎯 全球直连,[]GEOSITE,category-games@cn

;Steam CDN 下载直连
ruleset=🎯 全球直连,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Steam_CDN_Classical.yaml,28800

;游戏平台下载直连
ruleset=🎯 全球直连,[]GEOSITE,category-game-platforms-download

;BT/PT Tracker
ruleset=🎯 全球直连,[]GEOSITE,category-public-tracker


;==================================================
; 广告拦截
;==================================================

ruleset=🆎 AdBlock,clash-domain:https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/rule/Surge/ZhihuAds/ZhihuAds.list,28800
ruleset=🆎 AdBlock,clash-domain:https://limbopro.com/Adblock4limbo.list,28800
ruleset=🆎 AdBlock,clash-domain:https://cdn.jsdelivr.net/gh/privacy-protection-tools/anti-AD@master/anti-ad-surge.txt,28800


;==================================================
; AI / OpenAI（优先于国外代理）
;==================================================

ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn


;==================================================
; 自定义代理规则
;==================================================

ruleset=🌐 国外代理,clash-domain:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Domain.yaml,28800
ruleset=🌐 国外代理,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Proxy_Classical_IP.yaml,28800


;==================================================
; 微软 / Steam
;==================================================

ruleset=🎮 Steam,[]GEOSITE,steam
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft


;==================================================
; 国内兜底
;==================================================

ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve


;==================================================
; PT/BT 非标准端口
;==================================================

ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800


;==================================================
; 最终规则
;==================================================

ruleset=🐟 漏网之鱼,[]FINAL


;==================================================
; 策略组设置
;==================================================

;手动选择
custom_proxy_group=🚀 手动选择`select`.*

;全球直连
custom_proxy_group=🎯 全球直连`select`[]DIRECT

;广告拦截
custom_proxy_group=🆎 AdBlock`select`[]REJECT`[]DIRECT

;低延迟（排除 pku）
custom_proxy_group=⚡ ‍低延迟`url-test`^(?!.*[Pp][Kk][Uu]).*$`https://i.ytimg.com/generate_204`300,,200

;自动选择（排除 pku）
custom_proxy_group=♻️ 自动选择`url-test`^(?!.*[Pp][Kk][Uu]).*$`https://cp.cloudflare.com/generate_204`300,,50

;ChatGPT 专用测速（排除 pku）
custom_proxy_group=🤖 ChatGPT`url-test`^(?!.*[Pp][Kk][Uu]).*$`https://chatgpt.com/cdn-cgi/trace`300,,50


;==================================================
; 服务策略组
;==================================================

;AI 服务
custom_proxy_group=🤖 AI服务`select`[]🤖 ChatGPT`[]⚡ ‍低延迟`[]♻️ 自动选择`[]🚀 手动选择`.*

;国外代理
custom_proxy_group=🌐 国外代理`select`[]🚀 手动选择`[]♻️ 自动选择`[]⚡ ‍低延迟`.*

;微软服务
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]♻️ 自动选择`[]🚀 手动选择`.*

;Steam
custom_proxy_group=🎮 Steam`select`[]🎯 全球直连`[]♻️ 自动选择`[]🚀 手动选择`.*

;漏网之鱼
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎯 全球直连`.*

;非标准端口
custom_proxy_group=🔀 非标端口`select`[]🐟 漏网之鱼`[]🎯 全球直连`.*


;==================================================
; subconverter 设置
;==================================================

enable_rule_generator=true
overwrite_original_rules=true
